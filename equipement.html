<!DOCTYPE html>
<html lang="fr">
<head>

<link rel="icon" type="image/png" href="https://i.postimg.cc/Y2g29xsg/Design-sans-titre-(30).png" />

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Équipement et Armement</title>

<link href="https://fonts.googleapis.com/css2?family=Merriweather&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background-color:#bdb7a8;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    min-height:100vh;
    color:#000;
}

/* Bouton retour */

.retour-container{
    padding:20px;
}

.btn-retour{
    display:inline-block;
    background:#007bff;
    color:#fff;
    text-decoration:none;
    padding:10px 18px;
    border-radius:6px;
    font-weight:bold;
    transition:.3s;
}

.btn-retour:hover{
    background:#0056b3;
}

/* Titre */

.header{
    text-align:center;
    padding:10px 20px 30px;
}

.header h1{
    font-family:'Merriweather',serif;
    font-size:2.5rem;
    margin-bottom:15px;
    text-shadow:1px 1px 3px rgba(255,255,255,.7);
}

/* Liste */

.block-list{
    text-align:center;
    padding:0 20px 40px;
}

.block-list a{
    display:block;
    margin:10px 0;
    color:#000;
    font-family:'Merriweather',serif;
    font-weight:bold;
    text-decoration:none;
    text-shadow:1px 1px 2px rgba(255,255,255,.6);
    transition:.2s;
}

.block-list a:hover{
    color:#007bff;
    text-decoration:underline;
    text-shadow:1px 1px 2px rgba(0,0,0,.3);
}

@media(max-width:768px){

    .header h1{
        font-size:2rem;
    }

    .btn-retour{
        padding:8px 14px;
        font-size:14px;
    }

}

@media(max-width:480px){

    .header h1{
        font-size:1.7rem;
    }

}

</style>

</head>

<body>

<div class="retour-container">
    <a href="https://lesblockhauslyssois.fr/Blockhaus.html" class="btn-retour">
        ← Retour
    </a>
</div>

<div class="header">
    <h1>Équipement et Armement</h1>
</div>

<div class="block-list">

    <a href="definitions/portetypea.html" target="_blank">
        Porte blindée de type A
    </a>

    <a href="definitions/portetypeb.html" target="_blank">
        Porte blindée de type B
    </a>

    <a href="definitions/portetypec.html" target="_blank">
        Porte blindée de type C
    </a>

    <a href="definitions/portetyped.html" target="_blank">
        Porte blindée de type D
    </a>

    <a href="definitions/blindebef.html" target="_blank">
        Créneau blindé type BEF
    </a>

    <a href="definitions/periscopev.html" target="_blank">
        Le périscope type V
    </a>

     <a href="definitions/TDSTG.html" target="_blank">
        La tourelle démontble STG
    </a>
    
 <a href="definitions/armement.html" target="_blank">
        L'Armement de la ligne
    </a>
    
</div>

<script>

const fonds = [
    "fond/fond1.jpg",
    "fond/fond2.jpg",
    "fond/fond3.jpg",
    "fond/fond4.jpg",
    "fond/fond5.jpg",
    "fond/fond6.jpg",
    "fond/fond7.jpg",
    "fond/fond8.jpg",
    "fond/fond9.jpg",
    "fond/fond10.jpg",
    "fond/fond11.jpg",
    "fond/fond12.jpg",
    "fond/fond13.jpg",
    "fond/fond14.jpg",
    "fond/fond15.jpg"
];

let precedent = localStorage.getItem("dernierFond");
let disponible = fonds.filter(f => f !== precedent);

if(disponible.length === 0){
    disponible = fonds;
}

let fondAleatoire = disponible[Math.floor(Math.random()*disponible.length)];

localStorage.setItem("dernierFond", fondAleatoire);

document.body.style.backgroundImage =
`linear-gradient(
rgba(189,183,168,.75),
rgba(189,183,168,.75)
),
url('${fondAleatoire}')`;

</script>

</body>
</html>
