<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BEF339 - Les Blockhaus Lyssois</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#bdb7a8;
    padding:20px;
}

.fiche{

    max-width:1000px;
    margin:auto;

    background:white;

    border-radius:12px;

    overflow:hidden;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.entete{

    background:#1976d2;
    color:white;

    padding:20px 25px;

}

.entete h1{

    font-size:32px;

}

.entete p{

    margin-top:5px;
    opacity:.9;

}

.infos{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:12px;

    padding:20px;

}

.info{

    background:#f4f7fb;

    border-left:4px solid #1976d2;

    border-radius:8px;

    padding:12px;

}

.info span{

    display:block;

    color:#1976d2;

    font-size:13px;

    font-weight:bold;

    margin-bottom:4px;

}

section{

    padding:0 20px 20px;

}

section h2{

    color:#1976d2;

    margin-bottom:10px;

    border-bottom:2px solid #1976d2;

    padding-bottom:5px;

}

p{

    line-height:1.6;

}

#map{

    height:350px;

    background:#ddd;

    border-radius:8px;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#666;

}

.galerie{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

    gap:10px;

}

.galerie img{

    width:100%;

    height:160px;

    object-fit:cover;

    border-radius:8px;

    transition:.2s;

}

.galerie img:hover{

    transform:scale(1.03);

}

.boutons{

    padding:20px;

    display:flex;

    gap:10px;

    flex-wrap:wrap;

}

.boutons a{

    text-decoration:none;

    background:#1976d2;

    color:white;

    padding:10px 18px;

    border-radius:6px;

    transition:.2s;

}

.boutons a:hover{

    background:#125ca8;

}

/* Responsive */

@media(max-width:700px){

body{

padding:10px;

}

.entete{

padding:15px;

}

.entete h1{

font-size:26px;

}

.infos{

grid-template-columns:1fr;

padding:15px;

}

section{

padding:0 15px 15px;

}

#map{

height:250px;

}

.galerie{

grid-template-columns:repeat(2,1fr);

}

.galerie img{

height:120px;

}

.boutons{

padding:15px;

flex-direction:column;

}

.boutons a{

text-align:center;

}

}

</style>

</head>

<body>

<div class="fiche">

<div class="entete">

<h1>BEF339</h1>

</div>

<div class="infos">

<div class="info">
<span>Commune</span>
Lys-lez-Lannoy
</div>

<div class="info">
<span>Type</span>
Blockhaus type R5
</div>

<div class="info">
<span>Construction</span>
1939
</div>

<div class="info">
<span>État</span>
semi-entérré
</div>


</div>

<section>

<h2>Description</h2>

<p>
Blockhaus britannique type R pour 5 F.M
</p>

</section>

<section>


</section>

<section>

<h2>Galerie</h2>

<div class="galerie">

<img src="https://placehold.co/600x400" alt="">
<img src="https://placehold.co/600x400" alt="">
<img src="https://placehold.co/600x400" alt="">
<img src="https://placehold.co/600x400" alt="">

</div>

</section>

<div class="boutons">

<a href="#"> Voir sur la carte</a>


</div>

</div>

</body>
</html>
