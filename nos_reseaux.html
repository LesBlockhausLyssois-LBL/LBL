<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Y2g29xsg/Design-sans-titre-(30).png" />
    <script src="mobile-detect.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos Réseaux - LesBlockhausLyssois</title>
    <link rel="stylesheet" href="style.css">

    <style>
      body {
    margin: 0;
    font-family: Arial, sans-serif;

    background-color: #bdb7a8;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    min-height: 100vh;
    color: #000;
}
        /* Optionnel : liens visibles */
        #reseaux a {
            color: #000;
            text-decoration: none;
            font-weight: bold;
        }

        #reseaux a:hover {
            color: #007bff;
            text-decoration: underline;
        }

</head>
<body>
    <aside class="sidebar"></aside>
    <script src="navigation.js"></script>

    <div id="reseaux" class="content">
        <h1>Nos Réseaux Sociaux :</h1>
        <ul>
            <li><a href="https://www.facebook.com/profile.php?id=61576009351029" target="_blank">Facebook</a></li>
            <li><a href="https://www.youtube.com/@LesBlockhausLyssois" target="_blank">YouTube</a></li>
            <li><a href="https://www.instagram.com/les_blockhaus_lyssois/" target="_blank">Instagram</a></li>
        </ul>
    </div>
    <script src="navigation.js"></script>
<script>
function showSection(sectionId, button) {
    document.querySelectorAll(".section").forEach(sec => sec.style.display = "none");
    document.getElementById(sectionId).style.display = "block";
    document.querySelectorAll(".top-buttons button").forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");
}

function searchBlockhaus() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let links = document.getElementById("blockhausList").getElementsByTagName("a");
    let resultsContainer = document.getElementById("searchResults");

    resultsContainer.innerHTML = "";

    if (input === "") {
        document.getElementById("blockhausList").style.display = "block";
        resultsContainer.style.display = "none";
        return;
    }

    document.getElementById("blockhausList").style.display = "none";
    resultsContainer.style.display = "block";

    let found = false;
    for (let i = 0; i < links.length; i++) {
        let txtValue = links[i].textContent || links[i].innerText;
        if (txtValue.toLowerCase().includes(input)) {
            resultsContainer.appendChild(links[i].cloneNode(true));
            found = true;
        }
    }
    if (!found) resultsContainer.innerHTML = "<em>Aucun résultat trouvé.</em>";
}
</script>
<script>
const fonds = [
    "fond/fond1.jpg",
    "fond/fond2.jpg",
    "fond/fond3.jpg",
    "fond/fond4.jpg",
    "fond/fond5.jpg",
    "fond/fond6.jpg",
    "fond/fond7.jpg",
    "fond/fond8.jpg",
    "fond/fond9.jpg",
    "fond/fond10.jpg",
    "fond/fond11.jpg",
    "fond/fond12.jpg",
    "fond/fond13.jpg",
    "fond/fond14.jpg",
    "fond/fond15.jpg"
];

let precedent = localStorage.getItem("dernierFond");
let disponible = fonds.filter(f => f !== precedent);

let fondAleatoire =
    disponible[Math.floor(Math.random() * disponible.length)];

localStorage.setItem("dernierFond", fondAleatoire);

document.body.style.backgroundImage =
    `linear-gradient(
        rgba(189,183,168,0.75),
        rgba(189,183,168,0.75)
    ),
    url('${fondAleatoire}')`;
</script>
</body>
</html>
